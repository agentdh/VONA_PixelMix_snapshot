name: Keep v1.0.3_13 as latest snapshot

on:
  push:
    paths:
      - '.github/workflows/cleanup-after-v1.0.3_13.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete snapshots newer than v1.0.3_13
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release list --repo "$REPO" --limit 100 --json tagName --jq '.[].tagName' |
          while IFS= read -r tag; do
            case "$tag" in
              v1.0.3_*)
                number="${tag#v1.0.3_}"
                if [[ "$number" =~ ^[0-9]+$ ]] && (( number > 13 )); then
                  echo "Deleting $tag"
                  gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
                fi
                ;;
            esac
          done

          gh release edit v1.0.3_13 --repo "$REPO" --latest
